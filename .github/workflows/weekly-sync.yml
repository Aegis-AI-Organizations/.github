name: Weekly Sync Discussion

on:
  schedule:
    - cron: '0 10 * * 5' # Every Friday at 10:00 AM UTC
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  create-discussion:
    runs-on: ubuntu-latest
    permissions:
      discussions: write
      contents: read
    steps:
      - name: Calculate Week Number
        id: date
        run: echo "week=$(date +'%V')" >> $GITHUB_OUTPUT

      - name: Get Repository and Category IDs
        id: ids
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch repository ID and discussion categories
          QUERY='query($owner:String!, $name:String!) {
            repository(owner:$owner, name:$name) {
              id
              discussionCategories(first:10) {
                nodes {
                  id
                  name
                }
              }
            }
          }'
          
          # Execute GraphQL query
          RESULT=$(gh api graphql -F owner='${{ github.repository_owner }}' -F name='.github' -f query="$QUERY")
          
          # Extract Repository ID
          REPO_ID=$(echo "$RESULT" | jq -r '.data.repository.id')
          
          # Extract Category ID for 'General' (or fallback to the first one available)
          CAT_ID=$(echo "$RESULT" | jq -r '.data.repository.discussionCategories.nodes[] | select(.name == "General") | .id')
          if [ -z "$CAT_ID" ] || [ "$CAT_ID" == "null" ]; then
            CAT_ID=$(echo "$RESULT" | jq -r '.data.repository.discussionCategories.nodes[0].id')
          fi
          
          echo "repo_id=$REPO_ID" >> $GITHUB_OUTPUT
          echo "cat_id=$CAT_ID" >> $GITHUB_OUTPUT

      - name: Create Weekly Sync Discussion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_ID: ${{ steps.ids.outputs.repo_id }}
          CAT_ID: ${{ steps.ids.outputs.cat_id }}
          WEEK: ${{ steps.date.outputs.week }}
          TEAM_MEMBERS: "@Antoine0703 @skignes @enzogagg @Dev2noe @axeldld"
        run: |
          TITLE="[Weekly Sync] Semaine $WEEK"
          BODY=$(cat <<EOF
          # 🛡️ Aegis AI - Weekly Sync (Semaine $WEEK)

          Bonjour l'équipe ! 👋

          C'est l'heure de notre synchronisation hebdomadaire. Merci de répondre à ce thread pour partager votre avancement global.

          ## 🔔 Notifications
          $TEAM_MEMBERS

          ## 📋 Instructions
          Chaque membre est invité à répondre avec son bilan de la semaine en suivant ce format :

          ### @VotrePseudo
          - **Progress**: Ce que j'ai accompli cette semaine (tous repos confondus).
          - **Plans**: Mes priorités pour la semaine prochaine.
          - **Problems**: Points de blocage ou alertes.

          Bonne synchronisation ! 🚀
          EOF
          )
          
          # Create discussion via GraphQL mutation
          gh api graphql -f query='
            mutation($repositoryId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
              createDiscussion(input: {
                repositoryId: $repositoryId, 
                categoryId: $categoryId, 
                title: $title, 
                body: $body
              }) {
                discussion {
                  url
                }
              }
            }' \
            -f repositoryId="$REPO_ID" \
            -f categoryId="$CAT_ID" \
            -f title="$TITLE" \
            -f body="$BODY"
