name: Sync Labels

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - main
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

jobs:
  labels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repository:
          - Aegis-AI-Organizations/Aegis-AI-Agent
          - Aegis-AI-Organizations/Aegis-AI-Api-Gateway
          - Aegis-AI-Organizations/Aegis-AI-Brain
          - Aegis-AI-Organizations/Aegis-AI-Dashboard
          - Aegis-AI-Organizations/Aegis-AI-Infra
          - Aegis-AI-Organizations/Aegis-AI-Proto
          - Aegis-AI-Organizations/Aegis-AI-Worker-Deployer
          - Aegis-AI-Organizations/Aegis-AI-Worker-Fixer
          - Aegis-AI-Organizations/Aegis-AI-Worker-Ingest
          - Aegis-AI-Organizations/Aegis-AI-Worker-Pentest
          - Aegis-AI-Organizations/Aegis-Documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strict Sync from YAML
        run: |
          for label in "bug" "documentation" "duplicate" "enhancement" "good first issue" "help wanted" "invalid" "question" "wontfix" "priority: P0-critical" "priority: P1-high" "priority: P2-medium" "priority: P3-low" "type: task"; do
            gh label delete "$label" --yes || true
          done

          yq e '.[] | [.name, .color, .description] | @tsv' .github/labels.yml | while IFS=$'\t' read -r name color description; do
            echo "Syncing label: $name"
            gh label edit "$name" --color "$color" --description "$description" || \
            gh label create "$name" --color "$color" --description "$description"
          done
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
          GH_REPO: ${{ matrix.repository }}