name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

jobs:
  labels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repository:
          - Aegis-AI-Organizations/Aegis-AI-Agent
          - Aegis-AI-Organizations/Aegis-AI-Api-Gateway
          - Aegis-AI-Organizations/Aegis-AI-Brain
          - Aegis-AI-Organizations/Aegis-AI-Dashboard
          - Aegis-AI-Organizations/Aegis-AI-Documentation
          - Aegis-AI-Organizations/Aegis-AI-Infra
          - Aegis-AI-Organizations/Aegis-AI-Landing
          - Aegis-AI-Organizations/Aegis-AI-Proto
          - Aegis-AI-Organizations/Aegis-AI-Worker-Deployer
          - Aegis-AI-Organizations/Aegis-AI-Worker-Fixer
          - Aegis-AI-Organizations/Aegis-AI-Worker-Ingest
          - Aegis-AI-Organizations/Aegis-AI-Worker-Pentest
          
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels via GitHub CLI
        run: |
          gh label clone Aegis-AI-Organizations/.github --force
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
          GH_REPO: ${{ matrix.repository }}